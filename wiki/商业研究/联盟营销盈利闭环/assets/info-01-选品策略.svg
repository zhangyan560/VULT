<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <!-- Background -->
  <rect width="800" height="1000" fill="#f0f4ff"/>

  <!-- ─── TITLE BANNER ─── -->
  <rect x="0" y="0" width="800" height="90" fill="#1a1a2e"/>
  <rect x="0" y="85" width="800" height="6" fill="#1a73e8"/>
  <!-- decorative accent strip -->
  <rect x="30" y="18" width="6" height="54" rx="3" fill="#1a73e8"/>
  <text x="55" y="43" fill="#ffffff" font-size="22" font-weight="700" letter-spacing="2">联盟营销</text>
  <text x="55" y="68" fill="#a0b4e8" font-size="13" letter-spacing="1">Affiliate Marketing</text>
  <text x="790" y="46" fill="#1a73e8" font-size="26" font-weight="800" text-anchor="end">入门与选品策略</text>
  <text x="790" y="70" fill="#6080c0" font-size="11" text-anchor="end">Selection Strategy · Vol.01</text>

  <!-- ─── SECTION 1: 核心问题 ─── -->
  <!-- Section label pill -->
  <rect x="30" y="108" width="120" height="28" rx="14" fill="#1a73e8"/>
  <text x="90" y="127" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">核心问题</text>
  <text x="165" y="127" fill="#1a1a2e" font-size="15" font-weight="700">什么值得推广？</text>

  <!-- Card 1 background -->
  <rect x="30" y="145" width="740" height="160" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="145" width="6" height="160" rx="3" fill="#1a73e8"/>

  <!-- Item 1 -->
  <circle cx="75" cy="185" r="18" fill="#e8f0fe"/>
  <text x="75" y="191" fill="#1a73e8" font-size="18" text-anchor="middle">✓</text>
  <text x="105" y="182" fill="#1a1a2e" font-size="13" font-weight="600">选择你真正用过的产品</text>
  <text x="105" y="200" fill="#666" font-size="11">亲身体验 → 更真实的内容 → 更高信任度 → 更高转化</text>

  <!-- Item 2 -->
  <circle cx="75" cy="237" r="18" fill="#fff3e0"/>
  <text x="75" y="243" fill="#f57c00" font-size="14" text-anchor="middle" font-weight="700">$</text>
  <text x="105" y="234" fill="#1a1a2e" font-size="13" font-weight="600">优先 High Ticket — 高佣金产品</text>
  <text x="105" y="252" fill="#666" font-size="11">单笔佣金目标</text>
  <rect x="220" y="240" width="110" height="22" rx="11" fill="#fff3e0"/>
  <text x="275" y="255" fill="#f57c00" font-size="12" font-weight="700" text-anchor="middle">$50 – $500 / 笔</text>

  <!-- Item 3 -->
  <circle cx="75" cy="289" r="18" fill="#e8f5e9"/>
  <text x="75" y="295" fill="#2e7d32" font-size="14" text-anchor="middle">↻</text>
  <text x="105" y="286" fill="#1a1a2e" font-size="13" font-weight="600">优先 Recurring — 持续性佣金</text>
  <text x="105" y="304" fill="#666" font-size="11">SaaS 软件 / 订阅服务 — 推广一次，月月收钱</text>

  <!-- Item 4 -->
  <circle cx="460" cy="237" r="18" fill="#fce4ec"/>
  <text x="460" y="243" fill="#c62828" font-size="13" text-anchor="middle">★</text>
  <text x="490" y="234" fill="#1a1a2e" font-size="13" font-weight="600">知名品牌 = 更高转化率</text>
  <text x="490" y="252" fill="#666" font-size="11">用户已有信任基础，无需从零建立品牌认知</text>

  <!-- ─── SECTION 2: 利基市场选择流程 ─── -->
  <rect x="30" y="328" width="120" height="28" rx="14" fill="#0d47a1"/>
  <text x="90" y="347" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">选择流程</text>
  <text x="165" y="347" fill="#1a1a2e" font-size="15" font-weight="700">利基市场 4 步法</text>

  <!-- Flow steps container -->
  <rect x="30" y="365" width="740" height="180" rx="12" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="55" y="385" width="155" height="140" rx="10" fill="#e8f0fe"/>
  <rect x="55" y="385" width="155" height="6" rx="3" fill="#1a73e8"/>
  <text x="132" y="410" fill="#1a73e8" font-size="22" font-weight="800" text-anchor="middle">01</text>
  <text x="132" y="432" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="middle">找兴趣/专业领域</text>
  <text x="132" y="452" fill="#555" font-size="10.5" text-anchor="middle">健身 · 财务 · 科技</text>
  <text x="132" y="468" fill="#555" font-size="10.5" text-anchor="middle">爱好 · 教育 · 旅行</text>
  <text x="132" y="490" fill="#1a73e8" font-size="10" text-anchor="middle" font-style="italic">选你真正了解的领域</text>

  <!-- Arrow 1→2 -->
  <polygon points="218,455 232,448 232,462" fill="#1a73e8"/>
  <line x1="210" y1="455" x2="232" y2="455" stroke="#1a73e8" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="235" y="385" width="155" height="140" rx="10" fill="#e3f2fd"/>
  <rect x="235" y="385" width="155" height="6" rx="3" fill="#1565c0"/>
  <text x="312" y="410" fill="#1565c0" font-size="22" font-weight="800" text-anchor="middle">02</text>
  <text x="312" y="432" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="middle">验证市场</text>
  <text x="312" y="452" fill="#555" font-size="10.5" text-anchor="middle">Google 搜索量</text>
  <text x="312" y="468" fill="#555" font-size="10.5" text-anchor="middle">+ 竞品分析</text>
  <text x="312" y="490" fill="#1565c0" font-size="10" text-anchor="middle" font-style="italic">需求存在才值得进入</text>

  <!-- Arrow 2→3 -->
  <polygon points="398,455 412,448 412,462" fill="#1a73e8"/>
  <line x1="390" y1="455" x2="412" y2="455" stroke="#1a73e8" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="415" y="385" width="155" height="140" rx="10" fill="#e8eaf6"/>
  <rect x="415" y="385" width="155" height="6" rx="3" fill="#3949ab"/>
  <text x="492" y="410" fill="#3949ab" font-size="22" font-weight="800" text-anchor="middle">03</text>
  <text x="492" y="432" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="middle">找联盟计划</text>
  <text x="492" y="452" fill="#555" font-size="10.5" text-anchor="middle">Amazon · Impact</text>
  <text x="492" y="468" fill="#555" font-size="10.5" text-anchor="middle">ShareASale · 官网</text>
  <text x="492" y="490" fill="#3949ab" font-size="10" text-anchor="middle" font-style="italic">多渠道寻找合作机会</text>

  <!-- Arrow 3→4 -->
  <polygon points="578,455 592,448 592,462" fill="#1a73e8"/>
  <line x1="570" y1="455" x2="592" y2="455" stroke="#1a73e8" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="595" y="385" width="155" height="140" rx="10" fill="#ede7f6"/>
  <rect x="595" y="385" width="155" height="6" rx="3" fill="#6a1b9a"/>
  <text x="672" y="410" fill="#6a1b9a" font-size="22" font-weight="800" text-anchor="middle">04</text>
  <text x="672" y="432" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="middle">评估佣金结构</text>
  <text x="672" y="452" fill="#555" font-size="10.5" text-anchor="middle">单次 vs 持续性</text>
  <text x="672" y="468" fill="#555" font-size="10.5" text-anchor="middle">客单价 × 佣金率</text>
  <text x="672" y="490" fill="#6a1b9a" font-size="10" text-anchor="middle" font-style="italic">计算真实收益潜力</text>

  <!-- ─── SECTION 3: 三大平台对比 ─── -->
  <rect x="30" y="568" width="120" height="28" rx="14" fill="#00695c"/>
  <text x="90" y="587" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">平台对比</text>
  <text x="165" y="587" fill="#1a1a2e" font-size="15" font-weight="700">三大联盟平台</text>

  <!-- Platform cards row -->
  <!-- Amazon Associates -->
  <rect x="30" y="608" width="228" height="160" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="608" width="228" height="8" rx="6" fill="#f90"/>
  <text x="144" y="640" fill="#1a1a2e" font-size="14" font-weight="700" text-anchor="middle">Amazon Associates</text>

  <rect x="50" y="652" width="80" height="20" rx="10" fill="#fff8e1"/>
  <text x="90" y="666" fill="#f57c00" font-size="10.5" font-weight="600" text-anchor="middle">易上手</text>
  <rect x="142" y="652" width="98" height="20" rx="10" fill="#fce4ec"/>
  <text x="191" y="666" fill="#c62828" font-size="10.5" font-weight="600" text-anchor="middle">佣金率低</text>

  <text x="50" y="694" fill="#555" font-size="11">佣金率：</text>
  <text x="110" y="694" fill="#e65100" font-size="12" font-weight="700">1% – 10%</text>
  <text x="50" y="714" fill="#555" font-size="11">Cookie：</text>
  <text x="105" y="714" fill="#e65100" font-size="12" font-weight="700">24 小时</text>
  <text x="50" y="734" fill="#555" font-size="11">适合：</text>
  <text x="95" y="734" fill="#333" font-size="11">实体商品推广新手</text>
  <text x="50" y="752" fill="#555" font-size="11">门槛：</text>
  <text x="95" y="752" fill="#2e7d32" font-size="11" font-weight="600">极低，免费申请</text>

  <!-- Impact / ShareASale -->
  <rect x="286" y="608" width="228" height="160" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="286" y="608" width="228" height="8" rx="6" fill="#1a73e8"/>
  <text x="400" y="640" fill="#1a1a2e" font-size="14" font-weight="700" text-anchor="middle">Impact · ShareASale</text>

  <rect x="306" y="652" width="80" height="20" rx="10" fill="#e8f0fe"/>
  <text x="346" y="666" fill="#1a73e8" font-size="10.5" font-weight="600" text-anchor="middle">知名品牌</text>
  <rect x="398" y="652" width="98" height="20" rx="10" fill="#e8f5e9"/>
  <text x="447" y="666" fill="#2e7d32" font-size="10.5" font-weight="600" text-anchor="middle">佣金较高</text>

  <text x="306" y="694" fill="#555" font-size="11">佣金率：</text>
  <text x="366" y="694" fill="#1565c0" font-size="12" font-weight="700">5% – 50%+</text>
  <text x="306" y="714" fill="#555" font-size="11">Cookie：</text>
  <text x="361" y="714" fill="#1565c0" font-size="12" font-weight="700">30 – 90 天</text>
  <text x="306" y="734" fill="#555" font-size="11">适合：</text>
  <text x="351" y="734" fill="#333" font-size="11">SaaS / 金融 / 教育</text>
  <text x="306" y="752" fill="#555" font-size="11">门槛：</text>
  <text x="351" y="752" fill="#e65100" font-size="11" font-weight="600">需申请，审核品牌</text>

  <!-- ClickBank -->
  <rect x="542" y="608" width="228" height="160" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="542" y="608" width="228" height="8" rx="6" fill="#6a1b9a"/>
  <text x="656" y="640" fill="#1a1a2e" font-size="14" font-weight="700" text-anchor="middle">ClickBank</text>

  <rect x="562" y="652" width="80" height="20" rx="10" fill="#ede7f6"/>
  <text x="602" y="666" fill="#6a1b9a" font-size="10.5" font-weight="600" text-anchor="middle">数字产品</text>
  <rect x="654" y="652" width="98" height="20" rx="10" fill="#f3e5f5"/>
  <text x="703" y="666" fill="#6a1b9a" font-size="10.5" font-weight="600" text-anchor="middle">超高佣金</text>

  <text x="562" y="694" fill="#555" font-size="11">佣金率：</text>
  <text x="622" y="694" fill="#6a1b9a" font-size="12" font-weight="700">50% – 75%</text>
  <text x="562" y="714" fill="#555" font-size="11">Cookie：</text>
  <text x="617" y="714" fill="#6a1b9a" font-size="12" font-weight="700">60 天</text>
  <text x="562" y="734" fill="#555" font-size="11">适合：</text>
  <text x="607" y="734" fill="#333" font-size="11">在线课程/电子书</text>
  <text x="562" y="752" fill="#555" font-size="11">注意：</text>
  <text x="607" y="752" fill="#c62828" font-size="11" font-weight="600">品质参差，需筛选</text>

  <!-- ─── SECTION 4: 黄金公式 ─── -->
  <rect x="30" y="790" width="740" height="178" rx="14" fill="#1a1a2e" filter="url(#shadow)"/>
  <rect x="30" y="790" width="740" height="6" rx="3" fill="#1a73e8"/>

  <!-- Section header -->
  <rect x="50" y="810" width="120" height="28" rx="14" fill="#1a73e8"/>
  <text x="110" y="829" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">黄金公式</text>
  <text x="185" y="829" fill="#e8f0fe" font-size="15" font-weight="700">选品收益计算</text>

  <!-- Formula boxes -->
  <rect x="50" y="850" width="170" height="60" rx="10" fill="#1e3a5f"/>
  <text x="135" y="875" fill="#64b5f6" font-size="11" text-anchor="middle">客单价</text>
  <text x="135" y="898" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">$200</text>

  <text x="238" y="885" fill="#1a73e8" font-size="28" font-weight="300" text-anchor="middle">×</text>

  <rect x="265" y="850" width="170" height="60" rx="10" fill="#1e3a5f"/>
  <text x="350" y="875" fill="#64b5f6" font-size="11" text-anchor="middle">佣金率</text>
  <text x="350" y="898" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">30%</text>

  <text x="453" y="885" fill="#1a73e8" font-size="28" font-weight="300" text-anchor="middle">=</text>

  <rect x="480" y="845" width="270" height="70" rx="10" fill="#1a73e8"/>
  <text x="615" y="869" fill="#e8f0fe" font-size="11" text-anchor="middle">单笔收益</text>
  <text x="615" y="900" fill="#ffffff" font-size="26" font-weight="800" text-anchor="middle">$60 / 笔</text>

  <!-- Target label -->
  <rect x="50" y="930" width="740" height="30" rx="8" fill="rgba(26,115,232,0.15)"/>
  <text x="400" y="950" fill="#64b5f6" font-size="13" font-weight="600" text-anchor="middle">目标：单笔收益 ≥ $50   ·   优先 Recurring 产品，实现月月被动收入</text>

  <!-- ─── FOOTER ─── -->
  <text x="400" y="988" fill="#9090a0" font-size="10" text-anchor="middle">联盟营销盈利闭环 · 选品策略 Vol.01 · 2026</text>

  <!-- ─── DEFS ─── -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
</svg>
